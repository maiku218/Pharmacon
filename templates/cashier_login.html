<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cashier Login - PharmaCon</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --bg-accent: #1e3a8a;
            --glass: rgba(255, 255, 255, 0.07);
            --glass-border: rgba(255, 255, 255, 0.12);
            --green: #4ade80;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        body {
            background: linear-gradient(135deg, var(--bg-dark) 0%, var(--bg-accent) 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .store-title {
            font-weight: 900;
            font-size: 24px;
            letter-spacing: -1px;
            margin-bottom: 30px;
            text-transform: uppercase;
        }
        .store-title span { color: var(--green); }

        .glass-box {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px 30px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }

        h2 { margin-bottom: 10px; font-weight: 300; letter-spacing: 1px; }
        p.subtitle { color: #94a3b8; font-size: 14px; margin-bottom: 25px; }

        input {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: white;
            outline: none;
            transition: 0.3s;
        }
        input:focus { border-color: var(--green); background: rgba(255,255,255,0.1); }

        button {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: none;
            background: var(--green);
            color: #0f172a;
            font-weight: 900;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 10px 15px rgba(74, 222, 128, 0.2); }

        .alert {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 14px;
        }
        .alert-error { background: rgba(239, 68, 68, 0.2); border: 1px solid #ef4444; color: #fca5a5; }
        .alert-success { background: rgba(34, 197, 94, 0.2); border: 1px solid #22c55e; color: #86efac; }

    </style>
</head>
<body>

<div class="login-container">
    <div class="store-title">A'S PHARMAHEALTH & <span>CONVENIENCE</span></div>

    <div class="glass-box">
        <h2>Cashier Login</h2>
        <p class="subtitle">Enter your cashier credentials</p>
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="alert alert-{{ category }}">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}
        <form method="POST">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Start Shift</button>
        </form>
    </div>
</div>

</body>
</html>
